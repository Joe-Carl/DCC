<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dreamland Christian Centre | Bible Study</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="dreamland Logo png - Copy.png"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:linear-gradient(-45deg,#0f172a,#1e293b,#0f172a,#020617);
    background-size:400% 400%;
    animation:gradientMove 12s ease infinite;
    color:white;
    min-height:100vh;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* NAVIGATION */
nav{
    background:rgba(15,23,42,0.8);
    padding:15px 40px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:0 0 20px rgba(0,212,255,0.3);
}

.nav-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.nav-left img{
    width:55px;
    height:55px;
    border-radius:50%;
    animation:floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
}

.church-title{
    display:flex;
    flex-direction:column;
}

.church-title span{
    font-size:13px;
    color:#00d4ff;
}

.back-link{
    text-decoration:none;
    color:#00d4ff;
    font-weight:600;
}

/* MAIN CONTAINER */
.container{
    max-width:900px;
    margin:60px auto;
    padding:40px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:20px;
    text-align:center;
    animation:fadeIn 1.2s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

select, input{
    padding:10px;
    border-radius:8px;
    border:none;
    margin:5px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#00d4ff;
    color:black;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

button:hover{
    box-shadow:0 0 15px #00d4ff;
}

/* Verse Section */
.verse-box{
    background:rgba(255,255,255,0.1);
    padding:25px;
    border-radius:15px;
    margin-bottom:25px;
    transition:0.5s;
}

.verse-ref{
    font-weight:600;
    color:#00d4ff;
}

.explanation{
    background:rgba(0,0,0,0.3);
    padding:20px;
    border-radius:12px;
    font-size:15px;
    line-height:1.6;
    margin-bottom:40px;
}

/* Online Bible Reader */
.reader-section{
    margin-top:40px;
    padding-top:30px;
    border-top:1px solid rgba(255,255,255,0.2);
}

.chapter-display{
    margin-top:20px;
    text-align:left;
    background:rgba(0,0,0,0.3);
    padding:20px;
    border-radius:15px;
    max-height:400px;
    overflow-y:auto;
}

.verse-number{
    color:#00d4ff;
    font-weight:600;
}
</style>
</head>

<body>

<nav>
    <a href="index.html" class="back-link">Home</a>
    
    <div class="nav-left">
        <img src="A New Design - Made with PosterMyWall (4).jpg" alt="Logo">
        <div class="church-title">
            <h2>Dreamland Christian Centre</h2>
            <span>Our Year of Great Impact</span>
        </div>
    </div>
</nav>

<div class="container">

<h1>📖 Daily Bible Study</h1>

<select id="versionSelect">
    <option value="kjv">King James Version (KJV)</option>
    <option value="niv">New International Version (NIV)</option>
    <option value="esv">English Standard Version (ESV)</option>
</select>

<div class="verse-box" id="verseBox">
    <div id="verseText"></div>
    <div class="verse-ref" id="verseRef"></div>
</div>

<div class="explanation" id="explanationText"></div>

<!-- 🔥 ADDED ONLINE BIBLE READER (Nothing Removed Above) -->
<div class="reader-section">

<h2>📖 Read The Bible Online</h2>

<input type="text" id="book" placeholder="Enter Book (e.g. John)">
<input type="number" id="chapter" placeholder="Chapter">

<select id="readerVersion">
    <option value="kjv">KJV</option>
    <option value="niv">NIV</option>
    <option value="esv">ESV</option>
</select>

<button onclick="loadChapter()">Load Chapter</button>

<div class="chapter-display" id="bibleContent">
Enter a book and chapter to begin reading.
</div>

</div>

</div>

<script>

const verses = {
    kjv: [
        {
            text:"Arise, shine; for thy light is come, and the glory of the Lord is risen upon thee.",
            ref:"Isaiah 60:1",
            explanation:"In this Year of Great Impact, Dreamland Christian Centre is called to arise and shine spiritually in our generation."
        },
        {
            text:"I can do all things through Christ which strengtheneth me.",
            ref:"Philippians 4:13",
            explanation:"Our impact comes through Christ’s strength, not human ability."
        }
    ],
    niv: [
        {
            text:"Arise, shine, for your light has come.",
            ref:"Isaiah 60:1",
            explanation:"God is calling Dreamland to shine brightly in this year."
        },
        {
            text:"I can do all this through him who gives me strength.",
            ref:"Philippians 4:13",
            explanation:"Through Christ, we accomplish great impact."
        }
    ],
    esv: [
        {
            text:"Arise, shine, for your light has come.",
            ref:"Isaiah 60:1",
            explanation:"This is our season to rise and influence."
        },
        {
            text:"I can do all things through him who strengthens me.",
            ref:"Philippians 4:13",
            explanation:"Christ empowers Dreamland for greatness."
        }
    ]
};

const today = new Date().getDate();

function loadVerse(version){
    const verseArray = verses[version];
    const verse = verseArray[today % verseArray.length];

    document.getElementById("verseText").innerText = verse.text;
    document.getElementById("verseRef").innerText = verse.ref;
    document.getElementById("explanationText").innerText = verse.explanation;
}

loadVerse("kjv");

document.getElementById("versionSelect").addEventListener("change", function(){
    loadVerse(this.value);
});

/* 🔥 ONLINE BIBLE FETCH */
async function loadChapter(){
    const book = document.getElementById("book").value;
    const chapter = document.getElementById("chapter").value;
    const version = document.getElementById("readerVersion").value;

    if(!book || !chapter){
        alert("Please enter book and chapter");
        return;
    }

    const contentDiv = document.getElementById("bibleContent");
    contentDiv.innerHTML = "Loading scripture...";

    try{
        const response = await fetch(`https://bible-api.com/${book}%20${chapter}?translation=${version}`);
        const data = await response.json();

        if(data.error){
            contentDiv.innerHTML = "Scripture not found. Please check spelling.";
            return;
        }

        let versesHTML = "";
        data.verses.forEach(v=>{
            versesHTML += `<p><span class="verse-number">${v.verse}</span> ${v.text}</p>`;
        });

        contentDiv.innerHTML = `<h3>${data.reference}</h3>` + versesHTML;

    }catch(error){
        contentDiv.innerHTML = "Error loading scripture.";
    }
}

</script>

</body>
</html>
